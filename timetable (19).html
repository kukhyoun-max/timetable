<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 1학기 수업 현황</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#f4f6fb;--surface:#fff;--surface2:#f0f2f8;--border:#e2e5ef;--bs:#c8cad8;--text:#1a1d2e;--muted:#8b90a7;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:24px;}
h1{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;}
/* stats */
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.sbadge{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:3px 11px;font-size:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.sbadge .d{width:8px;height:8px;border-radius:50%;}
.sbadge .l{color:var(--muted);}
.sbadge .n{font-weight:800;}
/* filter card */
.fc{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.frow{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;padding:14px 18px;}
.frow.rp{background:#fafbff;}
.frow.rt{background:#f8f9fc;border-top:1px solid var(--border);}
.fg{display:flex;flex-direction:column;gap:6px;}
.fg label{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.crow{display:flex;gap:5px;flex-wrap:wrap;}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
.chip:hover{border-color:var(--bs);color:var(--text);}
.chip.tall{background:#6366f1;border-color:#6366f1;color:#fff;}
.chip.tmodel{} .chip.tmodel.on{background:#a855f7;border-color:#a855f7;color:#fff;}
.chip.tcontent{} .chip.tcontent.on{background:#10b981;border-color:#10b981;color:#fff;}
.chip.tchief{} .chip.tchief.on{background:#ef4444;border-color:#ef4444;color:#fff;}
.chip.dall.on,.chip.dchip.on{background:#3b82f6;border-color:#3b82f6;color:#fff;}
.chip.pall.on{background:#6b7280;border-color:#6b7280;color:#fff;}
.pchip{display:flex;align-items:center;gap:4px;padding:4px 10px;}
.pchip .pd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ti{display:flex;gap:7px;align-items:center;}
.ti select{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:5px 9px;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer;}
.ti select:focus{outline:none;border-color:#3b82f6;}
.ti span{color:var(--muted);font-size:12px;}
.cbtn{padding:6px 13px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;margin-left:auto;}
.cbtn:hover{border-color:#ef4444;color:#ef4444;}
/* banner */
.banner{display:none;flex-wrap:wrap;gap:8px;align-items:center;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:9px 14px;margin-bottom:12px;font-size:12px;}
.banner.on{display:flex;}
.bl{color:#92400e;font-weight:700;}
.fn span{color:#059669;font-weight:700;margin-right:3px;}
.ab{color:#ef4444;font-weight:700;}
/* tabs */
.tabs{display:flex;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;width:fit-content;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.tab{padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;}
.tab:not(:last-child){border-right:1px solid var(--border);}
.tab.on{background:#3b82f6;color:#fff;}
/* person table */
.tw{overflow-x:auto;border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(0,0,0,.06);background:#fff;}
table{border-collapse:collapse;width:100%;min-width:820px;}
thead{position:sticky;top:0;z-index:20;}
th{background:#f8f9fc;padding:9px 5px;text-align:center;border-bottom:2px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;}
th:first-child{width:78px;font-size:11px;color:var(--muted);font-weight:700;}
th.ph{min-width:76px;padding:8px 4px;}
th.ph.hc{display:none;}
.phi{display:flex;align-items:center;justify-content:center;gap:4px;}
.phd{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.phn{font-size:11px;font-weight:700;}
.cbadge{font-size:9px;font-weight:700;background:#fee2e2;color:#ef4444;border-radius:3px;padding:1px 4px;margin-left:2px;}
td{border-right:1px solid var(--border);border-bottom:1px solid #f0f2f8;padding:0;position:relative;}
td.tc{font-size:11px;color:var(--muted);padding:0 10px;background:#f8f9fc;border-right:2px solid var(--border);white-space:nowrap;font-weight:600;position:sticky;left:0;z-index:5;text-align:center;height:36px;vertical-align:middle;}
td.pc{vertical-align:top;height:36px;}
td.pc.hc{display:none;}
tr{height:36px;}
tr:last-child td{border-bottom:none;}
tr.dd td{border-top:2px solid var(--border);}
tr.hr{display:none;}
tr.lr td{background:#fffbeb!important;}
tr.lr td.tc{background:#fef3c7!important;color:#b45309!important;font-weight:700;}
tr.lr{height:28px;}
.cb{display:flex;flex-direction:column;justify-content:flex-start;width:100%;height:100%;padding:3px 5px 2px 5px;overflow:hidden;}
.cb.cw{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.18) 0px,rgba(255,255,255,.18) 3px,transparent 3px,transparent 9px);}
.cb .cn{font-size:10px;font-weight:800;color:#fff;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cb .cs{font-size:9px;font-weight:500;color:rgba(255,255,255,.88);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
/* legend */
.leg{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.ls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.lt{font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-right:3px;white-space:nowrap;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.ld{width:10px;height:10px;border-radius:3px;}
.lsep{width:1px;height:14px;background:var(--border);margin:0 3px;}
</style>
</head>

    <div style="width:1px;height:36px;background:var(--border);align-self:flex-end;margin-bottom:2px;"></div>

  ["김지훈","월","13:00","14:00","[근무]홍보대사"],["김지훈","화","13:00","14:00","[근무]홍보대사"],
  ["김지훈","목","13:00","14:00","[근무]홍보대사"],["김지훈","화","16:00","18:00","[근무]홍보대사"]
].forEach(([p,d,s,e,name])=>{
  const k=`${p}|${d}|${s}`;
  SUBJ[k]=name;
});
function getSubj(p,d,s){return SUBJ[`${p}|${d}|${s}`]||'';}

const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const SLOTS=[];
for(let h=9;h<20;h++)for(let m of[0,30])SLOTS.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
const DEF_S='09:00',DEF_E='19:00';
let selTeam='전체',selPersons=new Set(),selDays=new Set(),selStart=DEF_S,selEnd=DEF_E;
let curView='person';

function isCls(p,d,ts){const c=toMin(ts);return CLASS_DATA.some(([a,b,s,e])=>a===p&&b===d&&toMin(s)<=c&&c<toMin(e));}
function isWrk(p,d,ts){const c=toMin(ts);return WORK_DATA.some(([a,b,s,e])=>a===p&&b===d&&toMin(s)<=c&&c<toMin(e));}
function isLunch(ts){return ts==='12:00'||ts==='12:30';}
function getActive(){
  if(selPersons.size>0)return PERSONS.filter(p=>selPersons.has(p));
  if(TEAMS[selTeam])return TEAMS[selTeam];
  return PERSONS;
}
function isFiltered(){return selTeam!=='전체'||selPersons.size>0||selDays.size>0||selStart!==DEF_S||selEnd!==DEF_E;}

// ── 통계 ──
function buildStats(){
  document.getElementById('statsRow').innerHTML=`
    <div class="sbadge"><div class="d" style="background:#6366f1"></div><span class="l">총원</span><span class="n">10명</span></div>
    <span style="color:var(--bs)">·</span>
    <div class="sbadge"><div class="d" style="background:#a855f7"></div><span class="l">모델팀</span><span class="n">4명</span></div>
    <div class="sbadge"><div class="d" style="background:#10b981"></div><span class="l">콘텐츠팀</span><span class="n">6명</span></div>
    <div class="sbadge"><div class="d" style="background:#ef4444"></div><span class="l">기장</span><span class="n">2명</span></div>`;
}

// ── 인원 칩 ──
function buildPersonChips(){
  const el=document.getElementById('personChips');
  const ab=document.createElement('button');
  ab.className='chip pall on';ab.dataset.person='전체';ab.textContent='전체';
  ab.style.cssText='background:#6b7280;border-color:#6b7280;color:#fff;';
  el.appendChild(ab);
  PERSONS.forEach(p=>{
    const b=document.createElement('button');
    b.className='chip pchip';b.dataset.person=p;
    b.style.borderColor=COLORS[p]+'88';
    b.innerHTML=`<span class="pd" style="background:${COLORS[p]}"></span>${p}`;
    el.appendChild(b);
  });
}

// ── 시간 select ──
function fillTime(){
  const s=document.getElementById('startTime'),e=document.getElementById('endTime');
  SLOTS.forEach(t=>{s.innerHTML+=`<option>${t}</option>`;e.innerHTML+=`<option>${t}</option>`;});
  e.innerHTML+=`<option>19:00</option>`;
  s.value=DEF_S;e.value=DEF_E;
  s.onchange=()=>{selStart=s.value;applyFilter();};
  e.onchange=()=>{selEnd=e.value;applyFilter();};
}

// ── 인원별 테이블 ──
function buildPersonTable(){
  const tbl=document.getElementById('mainTable');
  // 수업 rowspan 계산
  function calcSpans(data){
    const sp={},sk={};
    DAYS.forEach(day=>{sp[day]={};sk[day]={};
      PERSONS.forEach(p=>{sp[day][p]={};sk[day][p]=new Set();
        let i=0;
        while(i<SLOTS.length){
          const ts=SLOTS[i];
          const m=data.find(([a,b,s])=>a===p&&b===day&&s===ts);
          if(m){
            const em=toMin(m[3]);let span=0,j=i;
            while(j<SLOTS.length&&toMin(SLOTS[j])<em){span++;j++;}
            sp[day][p][ts]=span;
            for(let k=1;k<span;k++)if(SLOTS[i+k])sk[day][p].add(SLOTS[i+k]);
            i=j;
          }else{i++;}
        }
      });
    });
    return{sp,sk};
  }
  const{sp:csp,sk:csk}=calcSpans(CLASS_DATA);
  const{sp:wsp,sk:wsk}=calcSpans(WORK_DATA);

  let h='<thead><tr><th>시간</th>';
  PERSONS.forEach(p=>{
    const badge=CHIEFS[p]?`<span class="cbadge">기장</span>`:'';
    h+=`<th class="ph" data-person="${p}"><div class="phi"><span class="phd" style="background:${COLORS[p]}"></span><span class="phn">${p}${badge}</span></div></th>`;
  });
  h+='</tr></thead><tbody>';
  let fd=true;
  DAYS.forEach(day=>{
    SLOTS.forEach((ts,si)=>{
      const lunch=isLunch(ts);
      const dc2=si===0&&!fd?'dd':'';
      const lc=lunch?'lr':'';
      h+=`<tr class="${dc2} ${lc}" data-day="${day}" data-ts="${ts}">`;
      h+=`<td class="tc"><span style="color:${DC[day]};font-size:10px;font-weight:800;margin-right:3px;">${si===0?day:''}</span>${ts}</td>`;
      PERSONS.forEach(p=>{
        if(csk[day][p].has(ts)||wsk[day][p].has(ts))return;
        const cls=isCls(p,day,ts),wrk=isWrk(p,day,ts);
        const cs=csp[day][p][ts]||0,ws=wsp[day][p][ts]||0;
        const span=cs||ws;
        if(!cls&&!wrk){h+=`<td class="pc" data-person="${p}"></td>`;return;}
        const rs=span>1?` rowspan="${span}"`:'';
        const bg=cls?COLORS[p]:COLORS[p]+'bb';
        const wc=!cls?'cw':'';
        const subj=cls?(getSubj(p,day,ts)||''):'근무 중';
        const ch=span*36;
        h+=`<td class="pc" data-person="${p}"${rs} style="padding:0;vertical-align:top;height:${ch}px;">
          <div class="cb ${wc}" style="background-color:${bg};min-height:${ch}px;">
            <span class="cn">${p}</span><span class="cs">${subj}</span>
          </div></td>`;
      });
      h+='</tr>';
    });
    fd=false;
  });
  h+='</tbody>';
  tbl.innerHTML=h;
}

// ── 요일별 뷰 ──
function buildGroupView(){
  const active=getActive();
  const activeDays=selDays.size>0?DAYS.filter(d=>selDays.has(d)):DAYS;
  const startMin=toMin(selStart),endMin=toMin(selEnd);
  const ROW_H=36,COL_W=72,TIME_W=64;
  const N=PERSONS.length; // 항상 10 고정

  const visSlots=SLOTS.filter(ts=>{
    const m=toMin(ts);
    if(selStart!==DEF_S||selEnd!==DEF_E)return m>=startMin&&m<=endMin;
    return true;
  });
  if(!visSlots.length){document.getElementById('groupTableWrap').innerHTML='<div style="padding:20px;color:#888;">표시할 시간대 없음</div>';return;}

  const visStart=toMin(visSlots[0]);
  const totalH=visSlots.length*ROW_H;

  function tsToY(ts){return Math.round((toMin(ts)-visStart)/30*ROW_H);}
  function tsToH(s,e){
    const sm=Math.max(toMin(s),visStart);
    const em=Math.min(toMin(e),visStart+visSlots.length*30);
    return Math.round((em-sm)/30*ROW_H);
  }

  // 전체 wrapper
  let out=`<div style="display:flex;overflow-x:auto;">`;

  // 시간 눈금
  out+=`<div style="flex-shrink:0;width:${TIME_W}px;position:sticky;left:0;z-index:10;background:#fff;">`;
  out+=`<div style="height:56px;border-right:2px solid var(--border);border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);font-weight:700;background:#f8f9fc;">시간</div>`;
  visSlots.forEach(ts=>{
    const lunch=ts==='12:00'||ts==='12:30';
    const bg=lunch?'#fef3c7':'#f8f9fc';
    const col=lunch?'#b45309':'var(--muted)';
    out+=`<div style="height:${ROW_H}px;border-right:2px solid var(--border);border-bottom:1px solid #e2e5ef;background:${bg};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:${col};">${ts}</div>`;
  });
  out+=`</div>`;

  // 요일별 컬럼
  activeDays.forEach(day=>{
    const dayW=N*COL_W;
    out+=`<div style="flex-shrink:0;border-left:2px solid var(--bs);">`;

    // 헤더 Row1: 요일명
    out+=`<div style="height:28px;width:${dayW}px;background:#f8f9fc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${DC[day]};">${day}요일</div>`;

    // 헤더 Row2: 사람 이름 (항상 PERSONS 순서, 10칸 고정)
    out+=`<div style="height:28px;display:flex;border-bottom:2px solid var(--border);">`;
    PERSONS.forEach((p,pi)=>{
      const isAct=active.includes(p);
      const dim=isAct?'':'opacity:0.2;';
      const borderR=pi<N-1?'border-right:1px solid var(--border);':'';
      out+=`<div style="width:${COL_W}px;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:700;background:#f8f9fc;${borderR}${dim}overflow:hidden;">
        <span style="width:6px;height:6px;border-radius:50%;background:${COLORS[p]};display:inline-block;flex-shrink:0;"></span>
        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p}</span>
      </div>`;
    });
    out+=`</div>`;

    // 바디: position:relative 컨테이너 + 그리드 + 블록
    out+=`<div style="position:relative;width:${dayW}px;height:${totalH}px;">`;

    // 그리드 배경선
    visSlots.forEach((ts,si)=>{
      const lunch=ts==='12:00'||ts==='12:30';
      const bg=lunch?'background:#fffbeb;':'';
      out+=`<div style="position:absolute;left:0;top:${si*ROW_H}px;width:100%;height:${ROW_H}px;border-bottom:1px solid #f0f2f8;${bg}"></div>`;
    });
    // 세로 구분선
    PERSONS.forEach((_,pi)=>{
      if(pi===0)return;
      out+=`<div style="position:absolute;left:${pi*COL_W}px;top:0;width:1px;height:100%;background:#f0f2f8;"></div>`;
    });

    // 수업/근무 블록 — PERSONS 인덱스로 정확히 배치
    PERSONS.forEach((p,pi)=>{
      if(!active.includes(p))return;
      // 수업
      CLASS_DATA.filter(([a,b])=>a===p&&b===day).forEach(([a,b,s,e])=>{
        const y=tsToY(s),bh=tsToH(s,e);
        if(bh<=0)return;
        const subj=getSubj(p,day,s)||'';
        out+=`<div style="position:absolute;left:${pi*COL_W+1}px;top:${y}px;width:${COL_W-2}px;height:${bh-1}px;background:${COLORS[p]};border-radius:3px;overflow:hidden;z-index:2;">
          <div style="padding:3px 4px;">
            <div style="font-size:10px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${p}</div>
            <div style="font-size:9px;color:rgba(255,255,255,.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;margin-top:1px;">${subj}</div>
          </div></div>`;
      });
      // 근무
      WORK_DATA.filter(([a,b])=>a===p&&b===day).forEach(([a,b,s,e])=>{
        const y=tsToY(s),bh=tsToH(s,e);
        if(bh<=0)return;
        out+=`<div style="position:absolute;left:${pi*COL_W+1}px;top:${y}px;width:${COL_W-2}px;height:${bh-1}px;background:${COLORS[p]}bb;border-radius:3px;overflow:hidden;z-index:2;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.18) 0px,rgba(255,255,255,.18) 3px,transparent 3px,transparent 9px);">
          <div style="padding:3px 4px;">
            <div style="font-size:10px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${p}</div>
            <div style="font-size:9px;color:rgba(255,255,255,.88);line-height:1.2;margin-top:1px;">근무 중</div>
          </div></div>`;
      });
    });

    out+=`</div></div>`; // 바디 + 요일 컬럼 끝
  });
  out+=`</div>`; // flex wrapper 끝
  document.getElementById('groupTableWrap').innerHTML=out;
}

// ── 필터 적용 ──
function applyFilter(){
  const active=getActive();
  const sm=toMin(selStart),em=toMin(selEnd);
  // 인원별 뷰: 열/행 토글
  document.querySelectorAll('th.ph,td.pc').forEach(el=>{
    el.classList.toggle('hc',!active.includes(el.dataset.person));
  });
  const free=new Set(active);
  document.querySelectorAll('#mainTable tbody tr').forEach(tr=>{
    const day=tr.dataset.day,ts=tr.dataset.ts;
    if(!day)return;
    const dm=selDays.size===0||selDays.has(day);
    const tm=toMin(ts)>=sm&&toMin(ts)<=em;
    const show=dm&&(selStart!==DEF_S||selEnd!==DEF_E?tm:true);
    tr.classList.toggle('hr',!show);
    if(show&&(selDays.size>0||selStart!==DEF_S||selEnd!==DEF_E)){
      active.forEach(p=>{if(isCls(p,day,ts))free.delete(p);});
    }
  });
  // 배너
  const ban=document.getElementById('banner');
  if(isFiltered()){
    let parts=[];
    if(selTeam!=='전체')parts.push(selTeam);
    if(selPersons.size>0)parts.push([...selPersons].join('·'));
    if(selDays.size>0)parts.push([...selDays].map(d=>d+'요일').join(' '));
    if(selStart!==DEF_S||selEnd!==DEF_E)parts.push(`${selStart}~${selEnd}`);
    document.getElementById('bannerText').textContent=parts.join(' / ');
    const fa=[...free];
    document.getElementById('freeNames').innerHTML=fa.length>0
      ?fa.map(n=>`<span>${n}</span>`).join(' · ')
      :'<span class="ab">전원 수업 있음</span>';
    ban.classList.add('on');
  }else{ban.classList.remove('on');}
  if(curView==='group')buildGroupView();
}

// ── 뷰 전환 ──
function switchView(v){
  curView=v;
  document.getElementById('tabPerson').classList.toggle('on',v==='person');
  document.getElementById('tabGroup').classList.toggle('on',v==='group');
  document.getElementById('personTableWrap').style.display=v==='person'?'':'none';
  document.getElementById('groupTableWrap').style.display=v==='group'?'':'none';
  if(v==='group')buildGroupView();
}

// ── 초기화 ──
function clearFilter(){
  selTeam='전체';selPersons.clear();selDays.clear();selStart=DEF_S;selEnd=DEF_E;
  document.querySelectorAll('#teamChips .chip').forEach(c=>c.classList.remove('on'));
  document.querySelector('#teamChips .tall').classList.add('on');
  document.querySelectorAll('#personChips .chip').forEach(c=>{
    c.classList.remove('on');
    if(c.dataset.person==='전체'){c.style.cssText='background:#6b7280;border-color:#6b7280;color:#fff;';}
    else{c.style.cssText=`border-color:${COLORS[c.dataset.person]}88;background:'';color:'';`;}
    c.style.display='';
  });
  document.querySelectorAll('#dayChips .chip').forEach(c=>c.classList.remove('on'));
  document.querySelector('#dayChips .dall').classList.add('on');
  document.getElementById('startTime').value=DEF_S;
  document.getElementById('endTime').value=DEF_E;
  applyFilter();
}

// ── 이벤트 ──
document.getElementById('teamChips').addEventListener('click',e=>{
  const chip=e.target.closest('.chip');if(!chip)return;
  document.querySelectorAll('#teamChips .chip').forEach(c=>c.classList.remove('on'));
  chip.classList.add('on');
  selTeam=chip.dataset.team;
  selPersons.clear();
  const members=TEAMS[selTeam];
  document.querySelectorAll('#personChips .chip').forEach(c=>{
    c.classList.remove('on');
    if(c.dataset.person==='전체'){c.style.cssText='background:#6b7280;border-color:#6b7280;color:#fff;';}
    else{c.style.cssText=`border-color:${COLORS[c.dataset.person]}88;`;}
    c.style.display=(!members||members.includes(c.dataset.person)||c.dataset.person==='전체')?'':'none';
  });
  applyFilter();
});

document.getElementById('personChips').addEventListener('click',e=>{
  const chip=e.target.closest('.chip');if(!chip)return;
  const p=chip.dataset.person;
  if(p==='전체'){
    selPersons.clear();
    document.querySelectorAll('#personChips .chip').forEach(c=>{
      c.classList.remove('on');
      if(c.dataset.person==='전체'){c.style.cssText='background:#6b7280;border-color:#6b7280;color:#fff;';}
      else{c.style.cssText=`border-color:${COLORS[c.dataset.person]}88;`;}
    });
    chip.classList.add('on');
  }else{
    document.querySelector('#personChips .pall').classList.remove('on');
    document.querySelector('#personChips .pall').style.cssText='border-color:#6b728088;';
    if(selPersons.has(p)){
      selPersons.delete(p);chip.classList.remove('on');
      chip.style.cssText=`border-color:${COLORS[p]}88;`;
    }else{
      selPersons.add(p);chip.classList.add('on');
      chip.style.cssText=`background:${COLORS[p]};border-color:${COLORS[p]};color:#fff;`;
    }
    if(selPersons.size===0){
      const ac=document.querySelector('#personChips .pall');
      ac.classList.add('on');ac.style.cssText='background:#6b7280;border-color:#6b7280;color:#fff;';
    }
    if(selPersons.size>0){
      selTeam='전체';
      document.querySelectorAll('#teamChips .chip').forEach(c=>c.classList.remove('on'));
      document.querySelector('#teamChips .tall').classList.add('on');
    }
  }
  applyFilter();
});

document.getElementById('dayChips').addEventListener('click',e=>{
  if(!e.target.classList.contains('chip'))return;
  const day=e.target.dataset.day;
  if(day==='전체'){
    selDays.clear();
    document.querySelectorAll('#dayChips .chip').forEach(c=>c.classList.remove('on'));
    e.target.classList.add('on');
  }else{
    document.querySelector('#dayChips .dall').classList.remove('on');
    if(selDays.has(day)){selDays.delete(day);e.target.classList.remove('on');}
    else{selDays.add(day);e.target.classList.add('on');}
    if(selDays.size===0)document.querySelector('#dayChips .dall').classList.add('on');
  }
  applyFilter();
});

document.getElementById('tabPerson').addEventListener('click',()=>switchView('person'));
document.getElementById('tabGroup').addEventListener('click',()=>switchView('group'));
document.getElementById('clearBtn').addEventListener('click',()=>clearFilter());

// ── 범례 ──
function buildLegend(){
  const el=document.getElementById('legendArea');
  const mHTML=TEAMS['모델팀'].map(p=>`<div class="li"><div class="ld" style="background:${COLORS[p]}"></div><span>${p}${CHIEFS[p]?'<b style="color:#ef4444;font-size:10px;margin-left:2px;">(기장)</b>':''}</span></div>`).join('');
  const cHTML=TEAMS['콘텐츠팀'].map(p=>`<div class="li"><div class="ld" style="background:${COLORS[p]}"></div><span>${p}${CHIEFS[p]?'<b style="color:#ef4444;font-size:10px;margin-left:2px;">(기장)</b>':''}</span></div>`).join('');
  el.innerHTML=`
    <div class="ls"><span class="lt" style="color:#a855f7">모델팀</span>${mHTML}<div class="lsep"></div><span class="lt" style="color:#10b981">콘텐츠팀</span>${cHTML}</div>
    <div class="ls"><span class="lt">구분</span>
      <div class="li"><div class="ld" style="background:#81C784"></div><span>수업</span></div>
      <div class="li"><div class="ld" style="background:#81C784bb;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.3) 0,rgba(255,255,255,.3) 2px,transparent 2px,transparent 6px);"></div><span>근무(기장)</span></div>
      <div class="li"><div class="ld" style="background:#fef3c7;border:1px solid #f6d860"></div><span>점심</span></div>
    </div>`;
}

// ── 초기 실행 ──
buildStats();
buildPersonChips();
fillTime();
buildPersonTable();
buildLegend();
</script>
